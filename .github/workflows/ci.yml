name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate module (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer -Path ./Fido2Ssh -Recurse -Severity @('Error','Warning')
          if ($results) {
              $results | Format-Table -AutoSize | Out-String | Write-Host
              $errors = @($results | Where-Object Severity -eq 'Error')
              if ($errors.Count -gt 0) {
                  throw "PSScriptAnalyzer found $($errors.Count) error(s)."
              }
          } else {
              Write-Host 'PSScriptAnalyzer: no issues found.'
          }

      - name: Test module manifest
        shell: pwsh
        run: |
          Test-ModuleManifest -Path ./Fido2Ssh/Fido2Ssh.psd1 | Format-List

      - name: Import module
        shell: pwsh
        run: |
          Import-Module ./Fido2Ssh/Fido2Ssh.psd1 -Force -ErrorAction Stop
          Get-Command -Module Fido2Ssh | Format-Table -AutoSize
